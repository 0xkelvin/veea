CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="the-tag"
CONFIG_BT_MAX_CONN=1
# Larger ATT MTU so photo notifications can carry 200-byte payloads.
# The phone will negotiate MTU on connection; we advertise up to 517 bytes.
CONFIG_BT_L2CAP_TX_MTU=517
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# Camera + filesystem for image capture
CONFIG_VIDEO=y
CONFIG_I2C=y
CONFIG_VIDEO_I2C_RETRY_NUM=3
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=1
CONFIG_VIDEO_BUFFER_POOL_ALIGN=32
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=4096
CONFIG_SDHC=y
CONFIG_SPI_SDHC=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_HEAP_MEM_POOL_SIZE=16384

# snprintf support for building numbered SD card filenames
CONFIG_CBPRINTF_FP_SUPPORT=n

# Use external PSRAM for large allocations (ESP32-S3 Sense has 8MB PSRAM)
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y
CONFIG_SPIRAM_TYPE_ESPPSRAM64=y
CONFIG_ESP_SPIRAM_SIZE=8388608
CONFIG_SPIRAM_SPEED_80M=y
CONFIG_ESP_SPIRAM_HEAP_SIZE=5242880

# PSRAM heap allocation support
CONFIG_SHARED_MULTI_HEAP=y

# Camera DMA descriptors - need more for high resolution
CONFIG_DMA_ESP32_MAX_DESCRIPTOR_NUM=512
